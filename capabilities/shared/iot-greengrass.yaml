naftiko: "1.0.0-alpha1"
info:
  label: Amazon IoT Greengrass API
  description: Extend AWS compute and services to edge devices.
  tags:
    - IoT
    - AWS
    - Edge Computing
    - Lambda
    - Device Management
  created: "2026-04-19"
  modified: "2026-04-19"
binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
    - type: http
      namespace: iot-greengrass
      baseUri: https://greengrass.amazonaws.com
      description: Amazon IoT Greengrass REST API
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: resources
          path: /
          description: Amazon IoT Greengrass resources
          operations:
            - name: list-components
              method: GET
              description: List Components
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
  exposes:
    - type: rest
      port: 8100
      namespace: iot-greengrass-rest
      resources:
        - path: /v1/resources
          name: resources
          description: Amazon IoT Greengrass resources
          operations:
            - method: GET
              name: list-components
              description: List Components
              call: "iot-greengrass.list-components"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9100
      namespace: iot-greengrass-mcp
      transport: http
      tools:
        - name: list-components
          description: Amazon IoT Greengrass List Components
          hints:
            readOnly: true
            openWorld: true
          call: "iot-greengrass.list-components"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-component-version
          description: Amazon IoT Greengrass Create Component Version
          hints:
            readOnly: false
            
          call: "iot-greengrass.create-component-version"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-core-devices
          description: Amazon IoT Greengrass List Core Devices
          hints:
            readOnly: true
            openWorld: true
          call: "iot-greengrass.list-core-devices"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-deployments
          description: Amazon IoT Greengrass List Deployments
          hints:
            readOnly: true
            openWorld: true
          call: "iot-greengrass.list-deployments"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-deployment
          description: Amazon IoT Greengrass Create Deployment
          hints:
            readOnly: false
            
          call: "iot-greengrass.create-deployment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-component
          description: Amazon IoT Greengrass Describe Component
          hints:
            readOnly: true
            openWorld: true
          call: "iot-greengrass.describe-component"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-core-device
          description: Amazon IoT Greengrass Get Core Device
          hints:
            readOnly: true
            openWorld: true
          call: "iot-greengrass.get-core-device"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-component-versions
          description: Amazon IoT Greengrass List Component Versions
          hints:
            readOnly: true
            openWorld: true
          call: "iot-greengrass.list-component-versions"
          outputParameters:
            - type: object
              mapping: "$."
